{% extends "layout.html" %}

{% block title %}Chat – Tiny Bench{% endblock %}

{% block content %}
<!-- State A: Landing -->
<div id="landing" class="hero-container">
    <h1 class="app-name">Monitor <kbd>Power</kbd> .</h1>
    <div class="input-area">
        <textarea id="landing-input" placeholder="Enter your prompt here..." rows="3"></textarea>
        <div class="input-meta">
            <select id="landing-model" aria-label="Select model"></select>
            <small>Press Enter to send, Shift+Enter for new line</small>
        </div>
    </div>
</div>

<!-- State B: Chat -->
<div id="chat" class="chat-container" hidden>
    <div id="chat-messages" class="chat-messages"></div>
    <div class="chat-input-bar">
        <select id="chat-model" class="model-pill" aria-label="Select model"></select>
        <div class="input-row">
            <textarea id="chat-input" placeholder="Message..." rows="1"></textarea>
            <button id="chat-send" class="send-btn" aria-label="Send">
                <svg class="icon-send" width="20" height="20" viewBox="0 0 20 20" fill="none">
                    <path d="M3 10L17 10M17 10L11 4M17 10L11 16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <svg class="icon-stop" width="20" height="20" viewBox="0 0 20 20" fill="none" style="display:none">
                    <rect x="4" y="4" width="12" height="12" rx="2" fill="currentColor"/>
                </svg>
            </button>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/chat.js" defer></script>
{% endblock %}
