{% extends "layout.html" %}

{% block title %}Fight – Tiny Bench{% endblock %}

{% block content %}
<!-- State A: Landing -->
<div id="fight-landing" class="hero-container">
    <h1 class="app-name">Model <kbd>Fight</kbd> .</h1>
    <div class="input-area">
        <div class="input-row">
            <textarea id="fight-input" placeholder="Enter your prompt..." rows="3"></textarea>
            <button id="fight-send" class="send-btn" aria-label="Send">
                <svg class="icon-send" width="20" height="20" viewBox="0 0 20 20" fill="none">
                    <path d="M3 10L17 10M17 10L11 4M17 10L11 16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
        </div>
        <small>Press Enter to send — two random models will compete</small>
    </div>
</div>

<!-- State B: Fight split view -->
<div id="fight-arena" class="fight-container" hidden>
    <div class="fight-header">
        <span class="fight-prompt-label">Prompt:</span>
        <span id="fight-prompt-text" class="fight-prompt-text"></span>
    </div>
    <div class="fight-panes">
        <div id="pane-a" class="fight-pane">
            <div class="pane-label" id="label-a">Model A</div>
            <div class="pane-output" id="output-a"></div>
            <button class="pane-vote" id="vote-a" disabled>Pick A</button>
        </div>
        <div id="pane-b" class="fight-pane">
            <div class="pane-label" id="label-b">Model B</div>
            <div class="pane-output" id="output-b"></div>
            <button class="pane-vote" id="vote-b" disabled>Pick B</button>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/fight.js" defer></script>
{% endblock %}
