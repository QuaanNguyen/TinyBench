<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Tiny Bench{% endblock %}</title>
    <!-- Pico.css Sand -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.sand.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/css/app.css">
    {% block head %}{% endblock %}
</head>
<body>
    <!-- Sidebar -->
    <aside>
        <nav>
            <ul>
                <li><a href="/"><strong><sup>Mini</sup><sub>Bench</sub></strong></a></li>
                <li><a href="/" class="secondary">Chat</a></li>
                <li><a href="/ranking" class="secondary">Ranking</a></li>
                <li><a href="/power" class="secondary">Power</a></li>
                <li><a href="/fight" class="secondary">Fight</a></li>
            </ul>
        </nav>
    </aside>

    <!-- Main Content -->
    <main>
        {% block content %}{% endblock %}
    </main>

    {% block scripts %}{% endblock %}
</body>
</html>
